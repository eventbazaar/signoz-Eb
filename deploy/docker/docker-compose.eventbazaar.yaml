# EventBazaar Production Deployment
# Specs: 4 vCPU / 16 GB RAM / 200 GB NVMe
# UI:   https://otel-ui.eventbazaar.com
# OTLP: https://otel-push.eventbazaar.com

x-common: &common
  networks:
    signoz-eb-net: {}
  restart: unless-stopped
  logging:
    options:
      max-size: 50m
      max-file: "3"

x-clickhouse-defaults: &clickhouse-defaults
  !!merge <<: *common
  image: clickhouse/clickhouse-server:25.5.6
  tty: true
  labels:
    signoz.io/scrape: "true"
    signoz.io/port: "9363"
    signoz.io/path: "/metrics"
  depends_on:
    init-clickhouse:
      condition: service_completed_successfully
    zookeeper-1:
      condition: service_healthy
  healthcheck:
    test:
      - CMD
      - wget
      - --spider
      - -q
      - 0.0.0.0:8123/ping
    interval: 30s
    timeout: 5s
    retries: 3
  ulimits:
    nproc: 65535
    nofile:
      soft: 262144
      hard: 262144
  environment:
    - CLICKHOUSE_SKIP_USER_SETUP=1

x-zookeeper-defaults: &zookeeper-defaults
  !!merge <<: *common
  image: signoz/zookeeper:3.7.1
  user: root
  labels:
    signoz.io/scrape: "true"
    signoz.io/port: "9141"
    signoz.io/path: "/metrics"
  healthcheck:
    test:
      - CMD-SHELL
      - curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep null
    interval: 30s
    timeout: 5s
    retries: 3

x-db-depend: &db-depend
  !!merge <<: *common
  depends_on:
    clickhouse:
      condition: service_healthy

services:
  init-clickhouse:
    !!merge <<: *common
    image: clickhouse/clickhouse-server:25.5.6
    container_name: signoz-eb-init-clickhouse
    mem_limit: 256m
    cpus: "0.1"
    command:
      - bash
      - -c
      - |
        version="v0.0.1"
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
        echo "Fetching histogram-binary for $${node_os}/$${node_arch}"
        cd /tmp
        wget -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        tar -xvzf histogram-quantile.tar.gz
        mv histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    restart: on-failure
    volumes:
      - ../common/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/

  zookeeper-1:
    !!merge <<: *zookeeper-defaults
    container_name: signoz-eb-zookeeper-1
    mem_limit: 512m
    cpus: "0.25"
    volumes:
      - zookeeper-1:/bitnami/zookeeper
    environment:
      - ZOO_SERVER_ID=1
      - ALLOW_ANONYMOUS_LOGIN=yes
      - ZOO_AUTOPURGE_INTERVAL=1
      - ZOO_ENABLE_PROMETHEUS_METRICS=yes
      - ZOO_PROMETHEUS_METRICS_PORT_NUMBER=9141

  clickhouse:
    !!merge <<: *clickhouse-defaults
    container_name: signoz-eb-clickhouse
    mem_limit: 8g
    cpus: "2.0"
    volumes:
      - ../common/clickhouse/config.xml:/etc/clickhouse-server/config.xml
      - ../common/clickhouse/users.xml:/etc/clickhouse-server/users.xml
      - ../common/clickhouse/custom-function.xml:/etc/clickhouse-server/custom-function.xml
      - ../common/clickhouse/user_scripts:/var/lib/clickhouse/user_scripts/
      - ../common/clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml
      - clickhouse:/var/lib/clickhouse/

  signoz-telemetrystore-migrator:
    !!merge <<: *db-depend
    image: signoz/signoz-otel-collector:${OTELCOL_TAG:-v0.144.2}
    container_name: signoz-eb-telemetrystore-migrator
    mem_limit: 512m
    cpus: "0.25"
    environment:
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate bootstrap &&
        /signoz-otel-collector migrate sync up &&
        /signoz-otel-collector migrate async up
    restart: on-failure

  signoz:
    !!merge <<: *db-depend
    image: signoz/signoz:${VERSION:-v0.118.0}
    container_name: signoz-eb
    mem_limit: 2g
    cpus: "1.0"
    depends_on:
      clickhouse:
        condition: service_healthy
      signoz-telemetrystore-migrator:
        condition: service_completed_successfully
    # otel-collector-opamp-config.yaml hardcodes ws://signoz:4320/v1/opamp.
    # The alias lets Docker DNS resolve "signoz" to this container.
    networks:
      signoz-eb-net:
        aliases:
          - signoz
    # Port 8080 is NOT exposed externally — nginx proxies all traffic
    volumes:
      - sqlite:/var/lib/signoz/
      - ./signoz-config.yaml:/etc/signoz/signoz.yaml
    # Loads keys into the container (not the same as `docker compose --env-file`, which only affects Compose interpolation).
    # Use short-form paths only (works on all Compose v2); `.env.eventbazaar.local` must exist (run `cp .env.eventbazaar .env.eventbazaar.local` first).
    env_file:
      - .env.eventbazaar
      - .env.eventbazaar.local
    environment:
      - SIGNOZ_ALERTMANAGER_PROVIDER=signoz
      - SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_SQLSTORE_SQLITE_PATH=/var/lib/signoz/signoz.db
      - SIGNOZ_TOKENIZER_JWT_SECRET=${SIGNOZ_JWT_SECRET}
    command:
      - --config=/etc/signoz/signoz.yaml
    healthcheck:
      test:
        - CMD
        - wget
        - --spider
        - -q
        - localhost:8080/api/v1/health
      interval: 30s
      timeout: 5s
      retries: 3

  otel-collector:
    !!merge <<: *db-depend
    image: signoz/signoz-otel-collector:${OTELCOL_TAG:-v0.144.2}
    container_name: signoz-eb-otel-collector
    mem_limit: 1g
    cpus: "0.5"
    # Must wait for signoz to be healthy — otel-collector connects to signoz
    # on port 4320 (OpAMP) immediately at startup. If signoz is not yet ready,
    # OpAMP errors cause the health check extension to report unhealthy.
    depends_on:
      clickhouse:
        condition: service_healthy
      signoz:
        condition: service_healthy
    entrypoint:
      - /bin/sh
    command:
      - -c
      - |
        /signoz-otel-collector migrate sync check &&
        /signoz-otel-collector --config=/etc/otel-collector-config.yaml --manager-config=/etc/manager-config.yaml --copy-path=/var/tmp/collector-config.yaml
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml
      - ../common/signoz/otel-collector-opamp-config.yaml:/etc/manager-config.yaml
    environment:
      - OTEL_RESOURCE_ATTRIBUTES=host.name=signoz-eb-host,os.type=linux
      - LOW_CARDINAL_EXCEPTION_GROUPING=false
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN=tcp://clickhouse:9000
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER=cluster
      - SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION=true
      - SIGNOZ_OTEL_COLLECTOR_TIMEOUT=10m
    # Ports 4317/4318 are NOT exposed externally — nginx proxies all traffic

  nginx:
    !!merge <<: *common
    image: nginx:1.27-alpine
    container_name: signoz-eb-nginx
    mem_limit: 256m
    cpus: "0.1"
    depends_on:
      signoz:
        condition: service_healthy
      otel-collector:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-certs:/etc/nginx/certs:ro
    restart: unless-stopped

networks:
  signoz-eb-net:
    name: signoz-eb-net

volumes:
  clickhouse:
    name: signoz-eb-clickhouse
  sqlite:
    name: signoz-eb-sqlite
  zookeeper-1:
    name: signoz-eb-zookeeper-1
  nginx-certs:
    name: signoz-eb-nginx-certs
