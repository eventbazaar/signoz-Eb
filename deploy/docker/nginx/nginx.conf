user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  4096;
    multi_accept on;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;

    # Gzip for UI assets
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ─────────────────────────────────────────────
    # HTTP → HTTPS redirect (both domains)
    # ─────────────────────────────────────────────
    server {
        listen 80;
        server_name otel-ui.eventbazaar.com otel-push.eventbazaar.com;
        return 301 https://$host$request_uri;
    }

    # ─────────────────────────────────────────────
    # SigNoz Web UI
    # https://otel-ui.eventbazaar.com
    # ─────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name otel-ui.eventbazaar.com;

        ssl_certificate     /etc/nginx/certs/otel-ui.eventbazaar.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/otel-ui.eventbazaar.com/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:MozSSL:10m;
        ssl_stapling        on;
        ssl_stapling_verify on;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        client_max_body_size 32m;

        location / {
            proxy_pass         http://signoz:8080;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        "upgrade";
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
        }
    }

    # ─────────────────────────────────────────────
    # OTLP Ingestion Endpoint
    # https://otel-push.eventbazaar.com
    #
    # Routes:
    #   gRPC  → otel-collector:4317
    #   HTTP  → otel-collector:4318  (/v1/traces, /v1/metrics, /v1/logs)
    # ─────────────────────────────────────────────
    server {
        listen 443 ssl;
        http2  on;
        server_name otel-push.eventbazaar.com;

        ssl_certificate     /etc/nginx/certs/otel-push.eventbazaar.com/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/otel-push.eventbazaar.com/privkey.pem;

        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
        ssl_prefer_server_ciphers off;
        ssl_session_timeout 1d;
        ssl_session_cache   shared:MozSSL:10m;
        ssl_stapling        on;
        ssl_stapling_verify on;

        add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

        # Large payload limit for telemetry batches
        client_max_body_size 64m;

        # OTLP gRPC — detected by content-type: application/grpc
        location / {
            grpc_pass         grpc://otel-collector:4317;
            grpc_read_timeout 300s;
            grpc_send_timeout 300s;
            grpc_set_header   Host              $host;
            grpc_set_header   X-Real-IP         $remote_addr;
            grpc_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            grpc_set_header   X-Forwarded-Proto $scheme;

            # Only apply grpc_pass for actual gRPC traffic
            if ($content_type !~ "application/grpc") {
                return 415;
            }
        }

        # OTLP HTTP — traces, metrics, logs
        location /v1/ {
            proxy_pass         http://otel-collector:4318;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_send_timeout 120s;
        }
    }
}
